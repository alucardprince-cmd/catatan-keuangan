<!DOCTYPE html>
<html>
<head>
  <title>Catatan Keuangan</title>
  <link rel="manifest" href="manifest.json">
<style>
  input[type=number]::-webkit-inner-spin-button, 
  input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  input[type=number] {
    -moz-appearance: textfield;
  }
  body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    margin-top: 50px;
  }

  .container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }
    button:active {
  transform: scale(0.95);
  transform: translateY(2px);
  }
  .btn-tambah:hover {
  background: blue;
  }

  h1 {
    text-align: center;
  }

  input, select {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
  }

  button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    box-shadow: 0 4px 0 #2e7d32;
  }

   ul {
    list-style: none;
    padding: 0;
    margin-top: 15px;
  }

  li {
    background: #f9f9f9;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    opacity: 0;
    animation: fadeIn 0.3s forwards;
  }
  @keyframes fadeIn {
  to {
    opacity: 1;
  }
}
  li:hover {
  background: #0000003f;
}

  li button {
    width: auto;
    padding: 5px 8px;
    background: red;
    transition: all 0.3s ease;
  }
  button:hover {
    background: #e95d5d;
    transform: scale(1.02);
  }

  .masuk {
    color: green;
  }

  .keluar {
    color: red;
  }

  #total {
    text-align: center;
    color: blue;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Catatan Keuangan Harian</h1>

<select id="tipe">
  <option value="masuk">Pemasukan</option>
  <option value="keluar">Pengeluaran</option>
</select>

  <input type="text" id="keterangan" placeholder="Keterangan">
  <input type="number" id="jumlah" placeholder="Jumlah">

  <button onclick="tambahData()" class="btn-tambah">Tambah</button>
  

  <ul id="list"></ul>

  <h3 id="masuk">Pemasukan: Rp 0</h3>
  <h3 id="keluar">Pengeluaran: Rp 0</h3>
  <h2 id="total">Saldo: Rp 0</h2>

</div>

<script>
  self.addEventListener("install", function (e) {
  console.log("Service Worker Installed");
});
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

  let data = JSON.parse(localStorage.getItem("transaksi")) || [];

  function tampilkanData() {
    let list = document.getElementById("list");
    let total = 0;
    let totalMasuk = 0;
    let totalKeluar = 0;

    list.innerHTML = "";

    data.forEach((item, index) => {
      let li = document.createElement("li");
      if (item.tipe === "masuk") {
        li.classList.add("masuk");
      } else {
       li.classList.add("keluar");
      }

      let nilai = parseInt(item.jumlah);
      let tanda ="";

      if (item.tipe === "masuk") {
        total += nilai;
        tanda = "💵+";
        totalMasuk += nilai;
      } else {
        total -= nilai;
        tanda ="💸-";
        totalKeluar += nilai;
      }

      let saldo = totalMasuk - totalKeluar;

      li.innerHTML = `
        ${item.tanggal} | (${item.tipe}) ${tanda} ${item.ket} : Rp ${item.jumlah} 
        <button onclick="hapusData(${index})">Hapus</button>
      `;

      list.appendChild(li);
    });

    document.getElementById("total").innerText = "💰Total Uangku: Rp " + total;
    document.getElementById("masuk").innerText = "Pemasukan: Rp " + totalMasuk;
    document.getElementById("keluar").innerText = "Pengeluaran: Rp " + totalKeluar;
    document.getElementById("total").innerText = "Saldo: Rp " + saldo;
  }

  function tambahData() {
    let ket = document.getElementById("keterangan").value;
    let jumlah = document.getElementById("jumlah").value;
    let tipe = document.getElementById("tipe").value;
    let tanggal = new Date().toLocaleDateString();

    data.push({ 
      ket: ket,
      jumlah: jumlah,
      tipe: tipe,
      tanggal: tanggal });

    localStorage.setItem("transaksi", JSON.stringify(data));

    tampilkanData();
  }

  function hapusData(index) {
    data.splice(index, 1);

    localStorage.setItem("transaksi", JSON.stringify(data));

    tampilkanData();
  }

  tampilkanData();
</script>

</body>
</html>
